# Landing Page Index Service
# Compose fragment for serving the PeerMesh Core landing page via Traefik

services:
  index:
    image: nginx:alpine
    container_name: dockerlab-index
    restart: unless-stopped
    volumes:
      - ./index:/usr/share/nginx/html:ro
    networks:
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.index.rule=Host(`dockerlab.peermesh.org`)"
      - "traefik.http.routers.index.entrypoints=websecure"
      - "traefik.http.routers.index.tls=true"
      - "traefik.http.routers.index.tls.certresolver=letsencrypt"
      - "traefik.http.services.index.loadbalancer.server.port=80"
      # Security headers
      - "traefik.http.middlewares.index-headers.headers.stsSeconds=31536000"
      - "traefik.http.middlewares.index-headers.headers.stsIncludeSubdomains=true"
      - "traefik.http.middlewares.index-headers.headers.contentTypeNosniff=true"
      - "traefik.http.middlewares.index-headers.headers.frameDeny=true"
      - "traefik.http.routers.index.middlewares=index-headers"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  traefik:
    external: true
