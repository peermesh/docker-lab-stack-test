# ==============================================================
# Listmonk - Newsletter Manager - Docker Compose Fragment
# ==============================================================
# Self-hosted newsletter and mailing list manager
# 50-100MB RAM footprint, PostgreSQL backend
#
# Pattern Version: 1.0
# Documentation: patterns/listmonk/README.md
#
# Usage:
#   docker compose -f docker-compose.yml \
#                  -f patterns/listmonk/docker-compose.listmonk.yml \
#                  --profile postgresql --profile listmonk up -d
#
# Prerequisites:
#   1. Foundation running (Traefik)
#   2. PostgreSQL profile enabled
#   3. Configure .env with LISTMONK_* variables
#   4. Create database: see README.md
# ==============================================================

# ==============================================================
# Extension Fields (YAML Anchors for reuse)
# ==============================================================

x-listmonk-healthcheck: &listmonk-healthcheck
  interval: 30s
  timeout: 10s
  retries: 5
  start_period: 60s

x-listmonk-logging: &listmonk-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

# ==============================================================
# Services
# ==============================================================

services:
  # =============================================================
  # Listmonk - Newsletter & Mailing List Manager
  # =============================================================
  # Feature-rich newsletter manager with:
  # - Subscriber management and segmentation
  # - Campaign templates and scheduling
  # - Analytics and tracking
  # - REST API for integrations
  # =============================================================
  listmonk:
    image: listmonk/listmonk:latest
    container_name: ${COMPOSE_PROJECT_NAME:-stack}_listmonk

    profiles:
      - listmonk
      - full

    depends_on:
      postgres:
        condition: service_healthy

    secrets:
      - listmonk_db_password

    environment:
      # Database configuration
      LISTMONK_db__host: postgres
      LISTMONK_db__port: 5432
      LISTMONK_db__user: listmonk
      LISTMONK_db__password_file: /run/secrets/listmonk_db_password
      LISTMONK_db__database: listmonk
      LISTMONK_db__ssl_mode: disable

      # Application settings
      LISTMONK_app__address: 0.0.0.0:9000
      LISTMONK_app__admin_username: ${LISTMONK_ADMIN_USER:-admin}
      LISTMONK_app__admin_password: ${LISTMONK_ADMIN_PASSWORD:-}

      # Timezone
      TZ: ${TZ:-UTC}

    volumes:
      - ${COMPOSE_PROJECT_NAME:-stack}_listmonk_uploads:/listmonk/uploads
      - ${COMPOSE_PROJECT_NAME:-stack}_listmonk_static:/listmonk/static

    networks:
      - db-internal
      - proxy-external

    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M

    healthcheck:
      <<: *listmonk-healthcheck
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9000/api/health || exit 1"]

    restart: unless-stopped
    logging:
      <<: *listmonk-logging

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.listmonk.rule=Host(`newsletter.${DOMAIN:-example.com}`)"
      - "traefik.http.routers.listmonk.entrypoints=websecure"
      - "traefik.http.routers.listmonk.tls=true"
      - "traefik.http.routers.listmonk.tls.certresolver=letsencrypt"
      - "traefik.http.services.listmonk.loadbalancer.server.port=9000"
      - "com.centurylinklabs.watchtower.enable=false"

# ==============================================================
# Secrets
# ==============================================================

secrets:
  listmonk_db_password:
    file: ./secrets/listmonk_db_password

# ==============================================================
# Volumes
# ==============================================================

volumes:
  ${COMPOSE_PROJECT_NAME:-stack}_listmonk_uploads:
    driver: local
  ${COMPOSE_PROJECT_NAME:-stack}_listmonk_static:
    driver: local

# ==============================================================
# Networks (reference existing)
# ==============================================================

networks:
  db-internal:
    external: true
    name: ${COMPOSE_PROJECT_NAME:-stack}_db-internal
  proxy-external:
    external: true
    name: ${COMPOSE_PROJECT_NAME:-stack}_proxy-external
