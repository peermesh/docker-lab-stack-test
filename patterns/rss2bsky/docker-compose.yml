# ==============================================================
# rss2bsky - RSS to Bluesky Syndication - Docker Compose
# ==============================================================
# Lightweight cron-based RSS to Bluesky cross-posting
# Syndicates RSS feeds (Mastodon, WriteFreely, etc.) to Bluesky
#
# Usage:
#   docker compose up -d
#
# Prerequisites:
#   1. An RSS feed source (Mastodon, WriteFreely, or any RSS feed)
#   2. Bluesky account with app password
#   3. Configure .env with RSS2BSKY_* variables
#
# Resource Profile:
#   - Idle: 2-5MB (alpine crond)
#   - Active: ~20MB (during Python execution)
#   - Peak: ~30MB (parsing large feeds)
# ==============================================================

# ==============================================================
# Extension Fields (YAML Anchors for reuse)
# ==============================================================

x-rss2bsky-logging: &rss2bsky-logging
  driver: "json-file"
  options:
    max-size: "5m"
    max-file: "3"

# ==============================================================
# Services
# ==============================================================

services:
  # =============================================================
  # rss2bsky - RSS to Bluesky Bridge
  # =============================================================
  # Lightweight Python-based RSS to Bluesky syndication
  # Uses alpine + crond for minimal resource usage
  # Runs every 15 minutes by default (configurable)
  # =============================================================
  rss2bsky:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rss2bsky

    environment:
      # Bluesky credentials
      R2B_HANDLE: ${RSS2BSKY_HANDLE}
      R2B_PASSWORD: ${RSS2BSKY_APP_PASSWORD}

      # RSS feed URL (e.g., https://example.com/@user.rss)
      R2B_FEED_URL: ${RSS2BSKY_FEED_URL}

      # Optional: Only crosspost items after this date (RFC format)
      # Example: "Mon, 01 Jan 2024 00:00:00 +0000"
      R2B_START_POST_DATE: ${RSS2BSKY_START_DATE:-}

      # Cron schedule (default: every 15 minutes)
      RSS2BSKY_CRON: ${RSS2BSKY_CRON:-*/15 * * * *}

      # Timezone
      TZ: ${TZ:-UTC}

    volumes:
      # Persist state to track already-posted items
      - rss2bsky_data:/app/data

    deploy:
      resources:
        limits:
          memory: 64M
        reservations:
          memory: 16M

    restart: unless-stopped
    logging:
      <<: *rss2bsky-logging

# ==============================================================
# Volumes
# ==============================================================

volumes:
  rss2bsky_data:
    driver: local
