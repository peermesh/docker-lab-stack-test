# ==============================================================
# n8n Workflow Automation - Docker Compose Fragment
# ==============================================================
# Self-hosted workflow automation for POSSE syndication
#
# Example Version: 1.0
# Documentation: patterns/n8n/README.md
#
# Usage:
#   docker compose -f docker-compose.yml \
#                  -f patterns/n8n/docker-compose.n8n.yml \
#                  --profile n8n --profile postgresql up -d
#
# Prerequisites:
#   1. Foundation running (Traefik)
#   2. PostgreSQL profile enabled
#   3. Configure .env with N8N_* variables
#   4. Generate secrets: echo "your-password" > secrets/n8n_password
# ==============================================================

# ==============================================================
# Extension Fields (YAML Anchors for reuse)
# ==============================================================

x-n8n-healthcheck: &n8n-healthcheck
  interval: 30s
  timeout: 10s
  retries: 5
  start_period: 60s

x-n8n-logging: &n8n-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

# ==============================================================
# Services
# ==============================================================

services:
  # =============================================================
  # n8n Workflow Automation
  # =============================================================
  # Self-hosted workflow automation for:
  # - POSSE syndication to Bluesky, Dev.to, LinkedIn
  # - Webhook receivers from ActivityPub events
  # - Content transformation pipelines
  # =============================================================
  n8n:
    image: n8nio/n8n:latest
    container_name: ${COMPOSE_PROJECT_NAME:-stack}_n8n

    # ---------------------------------------------------------
    # Profile (optional - only starts with --profile n8n)
    # ---------------------------------------------------------
    profiles:
      - n8n
      - full

    # ---------------------------------------------------------
    # Dependencies
    # ---------------------------------------------------------
    depends_on:
      postgres:
        condition: service_healthy

    # ---------------------------------------------------------
    # Secrets Configuration
    # ---------------------------------------------------------
    secrets:
      - n8n_encryption_key
      - postgres_password

    # ---------------------------------------------------------
    # Environment Configuration
    # ---------------------------------------------------------
    environment:
      # Database (uses shared PostgreSQL)
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_USER: n8n
      DB_POSTGRESDB_PASSWORD_FILE: /run/secrets/postgres_password

      # Encryption key for credentials
      N8N_ENCRYPTION_KEY_FILE: /run/secrets/n8n_encryption_key

      # Host configuration
      N8N_HOST: n8n.${DOMAIN:-example.com}
      N8N_PORT: 5678
      N8N_PROTOCOL: https
      WEBHOOK_URL: https://n8n.${DOMAIN:-example.com}/

      # Security settings
      N8N_SECURE_COOKIE: "true"
      N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: "true"

      # Timezone
      GENERIC_TIMEZONE: ${TZ:-UTC}

      # Workflow settings
      N8N_IMPORT_EXPORT_DIR: /home/node/workflows
      EXECUTIONS_DATA_PRUNE: "true"
      EXECUTIONS_DATA_MAX_AGE: 168  # 7 days

      # Disable telemetry
      N8N_DIAGNOSTICS_ENABLED: "false"

    # ---------------------------------------------------------
    # Volumes
    # ---------------------------------------------------------
    volumes:
      # n8n data (credentials, settings)
      - n8n_data:/home/node/.n8n
      # Workflow import/export directory (optional)
      # - ./workflows:/home/node/workflows:ro

    # ---------------------------------------------------------
    # Network Configuration
    # ---------------------------------------------------------
    networks:
      # Database access
      - db-internal
      # Traefik access
      - proxy-external

    # ---------------------------------------------------------
    # Resource Limits
    # ---------------------------------------------------------
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

    # ---------------------------------------------------------
    # Health Check
    # ---------------------------------------------------------
    healthcheck:
      <<: *n8n-healthcheck
      test: ["CMD-SHELL", "wget -q --spider http://localhost:5678/healthz || exit 1"]

    # ---------------------------------------------------------
    # Restart Policy
    # ---------------------------------------------------------
    restart: unless-stopped

    # ---------------------------------------------------------
    # Logging
    # ---------------------------------------------------------
    logging:
      <<: *n8n-logging

    # ---------------------------------------------------------
    # Traefik Labels
    # ---------------------------------------------------------
    labels:
      # Enable Traefik
      - "traefik.enable=true"

      # ---------------------------------------------------------
      # Main Router
      # ---------------------------------------------------------
      - "traefik.http.routers.n8n.rule=Host(`n8n.${DOMAIN:-example.com}`)"
      - "traefik.http.routers.n8n.entrypoints=websecure"
      - "traefik.http.routers.n8n.tls=true"
      - "traefik.http.routers.n8n.tls.certresolver=letsencrypt"
      - "traefik.http.routers.n8n.service=n8n"

      # ---------------------------------------------------------
      # Service Definition
      # ---------------------------------------------------------
      - "traefik.http.services.n8n.loadbalancer.server.port=5678"

      # ---------------------------------------------------------
      # Watchtower Label (opt-in auto updates)
      # ---------------------------------------------------------
      - "com.centurylinklabs.watchtower.enable=false"

# ==============================================================
# Secrets
# ==============================================================

secrets:
  n8n_encryption_key:
    file: ./secrets/n8n_encryption_key
  postgres_password:
    file: ./secrets/postgres_password

# ==============================================================
# Volumes
# ==============================================================

volumes:
  # n8n data volume
  # Contains: Credentials, settings, execution logs
  n8n_data:
    driver: local

# ==============================================================
# Networks (reference existing)
# ==============================================================

networks:
  db-internal:
    external: true
    name: ${COMPOSE_PROJECT_NAME:-stack}_db-internal
  proxy-external:
    external: true
    name: ${COMPOSE_PROJECT_NAME:-stack}_proxy-external
