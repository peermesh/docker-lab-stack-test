# PeerTube Pattern - Compose Fragment
#
# This file is for reference. The main docker-compose.yml in the root
# directory contains the integrated PeerTube configuration.
#
# PeerTube requires:
# - PostgreSQL (from foundation)
# - Dedicated Redis instance (peertube-redis)
# - Traefik for routing (from foundation)
#
# Memory: 2GB minimum recommended
# Storage: Plan for video storage growth

services:
  peertube:
    image: chocobozzz/peertube:${PEERTUBE_VERSION:-production-bookworm}
    container_name: dlst_peertube

    profiles:
      - peertube
      - fediverse
      - full

    depends_on:
      postgres:
        condition: service_healthy
      peertube-redis:
        condition: service_healthy

    environment:
      PEERTUBE_DB_USERNAME: peertube
      PEERTUBE_DB_PASSWORD: ${PEERTUBE_DB_PASSWORD}
      PEERTUBE_DB_HOSTNAME: postgres
      PEERTUBE_DB_NAME: peertube
      PEERTUBE_REDIS_HOSTNAME: peertube-redis
      PEERTUBE_WEBSERVER_HOSTNAME: peertube.${DOMAIN}
      PEERTUBE_WEBSERVER_PORT: 443
      PEERTUBE_WEBSERVER_HTTPS: "true"
      PEERTUBE_TRUST_PROXY: '["127.0.0.1", "loopback", "172.16.0.0/12"]'
      PEERTUBE_ADMIN_EMAIL: ${ADMIN_EMAIL}
      PEERTUBE_SECRET: ${PEERTUBE_SECRET}
      PEERTUBE_INSTANCE_NO_TELEMETRY: "true"

    volumes:
      - peertube_data:/data
      - peertube_config:/config

    networks:
      - proxy-external
      - db-internal
      - peertube-internal

    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

    healthcheck:
      test: ["CMD-SHELL", "curl -fSs http://localhost:9000/api/v1/config || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

    restart: unless-stopped

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.peertube.rule=Host(`peertube.${DOMAIN}`)"
      - "traefik.http.routers.peertube.entrypoints=websecure"
      - "traefik.http.routers.peertube.tls=true"
      - "traefik.http.routers.peertube.tls.certresolver=letsencrypt"
      - "traefik.http.services.peertube.loadbalancer.server.port=9000"

  peertube-redis:
    image: redis:7-alpine
    container_name: dlst_peertube_redis

    profiles:
      - peertube
      - fediverse
      - full

    volumes:
      - peertube_redis:/data

    networks:
      - peertube-internal

    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

    restart: unless-stopped

volumes:
  peertube_data:
  peertube_config:
  peertube_redis:

networks:
  peertube-internal:
    driver: bridge
