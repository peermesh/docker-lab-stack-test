; ==============================================================
; WriteFreely Configuration
; ==============================================================
; This file is mounted into the container at /go/config.ini
; Environment variables are substituted at container startup
; ==============================================================

[server]
hidden_host = 
port       = 8080
bind       = 0.0.0.0

[database]
type     = mysql
username = writefreely
password = 
database = writefreely
host     = mysql
port     = 3306

[app]
; Site name displayed in the header
site_name         = Blog

; Public URL of your WriteFreely instance
host              = https://blog.example.com

; Theme: write, classic, or minimal
theme             = write

; Editor: wysiwyg or markdown
editor            = markdown

; Allow anonymous/draft posts
disable_drafts    = false

; Allow invites for new users (in multi-user mode)
user_invites      = user

; Open or closed registration
open_registration = false

; Federate posts via ActivityPub
federation        = true

; Show public stats
public_stats      = true

; Monetization settings
monetization      = false

; Enable reader mode (for multi-user instances)
local_timeline    = true

; Max blogs per user (0 = unlimited)
max_blogs         = 0

; Private mode (require login to view anything)
private           = false

; Single-user mode (only one blog, no registration)
single_user       = false

; Update checks
update_checks     = true

; Default post visibility
default_visibility = public

[oauth.generic]
; OAuth provider configuration (optional)
; client_id       =
; client_secret   =
; auth_endpoint   =
; token_endpoint  =
; inspect_endpoint =
; callback_proxy  =
; scope           = read_user

[email]
; SMTP settings for notifications
; domain       = example.com
; mailtype     = smtp
; username     =
; password     =
; host         = smtp.example.com
; port         = 587
; protocol     = starttls
